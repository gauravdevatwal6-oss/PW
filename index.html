<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGD-PW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #side-menu { transition: transform 0.3s ease-in-out; }
        .menu-open { transform: translateX(0); }
        .menu-closed { transform: translateX(-100%); }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden" onclick="toggleMenu()"></div>

    <aside id="side-menu" class="fixed inset-y-0 left-0 w-64 bg-[#1a1a1a] text-white z-50 menu-closed flex flex-col">
        <div class="p-4 flex items-center border-b border-gray-700">
            <div class="w-8 h-8 rounded-full border-2 border-white flex items-center justify-center mr-3 font-bold">Δ</div>
            <span class="text-xl font-semibold italic">Delta-Pw</span>
        </div>
        <nav class="flex-1 px-2 py-4 space-y-2">
            <a href="#" class="flex items-center px-4 py-3 text-white bg-gray-800 rounded-lg"><i class="fa-solid fa-book w-6"></i> Batches</a>
            <a href="#" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg"><i class="fa-solid fa-house w-6"></i> Home</a>
        </nav>
    </aside>

    <header class="bg-black text-white sticky top-0 z-30 h-14">
        <div id="default-header" class="flex items-center justify-between h-full px-4">
            <button onclick="toggleMenu()" class="text-white"><i class="fa-solid fa-bars text-xl"></i></button>
            <h1 class="text-lg font-semibold tracking-wide">Batches</h1>
            <button onclick="toggleSearch()" class="text-white"><i class="fa-solid fa-magnifying-glass text-xl"></i></button>
        </div>
        <div id="search-header" class="hidden items-center h-full px-2 bg-[#1a1a1a]">
            <button onclick="toggleSearch()" class="p-2 text-gray-300"><i class="fa-solid fa-chevron-left text-lg"></i></button>
            <input type="text" id="search-input" placeholder="Search for a batch..." class="w-full bg-transparent text-white px-2 py-1 focus:outline-none" oninput="filterBatches()">
            <button onclick="clearSearch()" id="clear-search-btn" class="p-2 text-gray-400 hidden"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-20">
        <div id="batches-container" class="space-y-4">
            </div>
    </main>

    <script>
        // =====================================================================
        // ⚙️ DATA SETTINGS: YAHAN SE AAP JAB MARZI KUCH BHI CHANGE KAR SAKTE HO ⚙️
        // =====================================================================
        
        const batchesData = [
            {
                title: "Arjuna JEE 2027",
                bgColor: "bg-[#FDF4D9]", // Box ke background ka color
                imgSrc: "ArjunaJEE-image.png", // 👈 BOX KI IMAGE YAHAN CHANGE KARE
                exploreLink: "https://www.google.com", // 👈 EXPLORE BUTTON LINK
                enrollLink: "https://www.youtube.com"  // 👈 ENROLL BUTTON LINK
            },
            {
                title: "Uday 2027 [ Class 11th ]",
                bgColor: "bg-[#FBE8EF]", 
                imgSrc: "Uday-image.png", // 👈 BOX KI IMAGE YAHAN CHANGE KAREIN
                exploreLink: "#",
                enrollLink: "#"
            },
            {
                title: "Arjuna JEE 2026",
                bgColor: "bg-[#E6F4FB]", 
                imgSrc: "https://placehold.co/400x200/E6F4FB/000000?text=Aapki+Image+3", // 👈 BOX KI IMAGE YAHAN CHANGE KAREIN
                tags: "NEW BATCH",
                exploreLink: "#",
                enrollLink: "#"
            }
        ];

        // =====================================================================
        // 🛑 ISKE NEECHE KA CODE CHANGE KARNE KI ZAROORAT NAHI HAI 🛑
        // =====================================================================

        function openLink(url) {
            if (url && url !== "#") {
                window.location.href = url;
            } else {
                alert("Bhai, iska link abhi add nahi kiya gaya hai!");
            }
        }

        function renderBatches(data) {
            const container = document.getElementById('batches-container');
            container.innerHTML = ''; 

            data.forEach(batch => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 cursor-pointer transform active:scale-[0.98] transition-all duration-150';
                
                card.innerHTML = `
                    <div class="relative ${batch.bgColor} h-36 pt-4 flex flex-col items-center justify-end rounded-t-2xl">
                        <div class="absolute top-3 left-3 bg-orange-500 text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm">
                            <i class="fa-solid fa-fire text-[8px]"></i> Trending
                        </div>
                        
                        <img src="${batch.imgSrc}" alt="${batch.title}" class="h-full w-[90%] object-contain object-bottom pointer-events-none">
                        
                        ${batch.tags ? `<div class="absolute bottom-0 bg-[#42312b] text-white text-[11px] font-bold px-3 py-1 rounded-t-md tracking-wider">${batch.tags}</div>` : ''}
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-[15px] mb-4 text-gray-800">${batch.title}</h3>
                        <div class="flex gap-3">
                            <button onclick="event.stopPropagation(); openLink('${batch.exploreLink}')" class="flex-1 bg-[#5A4BDA] hover:bg-[#4d3dc2] text-white py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 shadow-md active:scale-95 transition-all">
                                <i class="fa-solid fa-book-open"></i> Explore
                            </button>
                            <button onclick="event.stopPropagation(); openLink('${batch.enrollLink}')" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-800 py-2.5 rounded-lg text-sm font-bold flex items-center justify-center gap-2 shadow-md active:scale-95 transition-all">
                                <i class="fa-solid fa-crown text-yellow-500"></i> Enroll
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('menu-closed');
            document.getElementById('side-menu').classList.toggle('menu-open');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function toggleSearch() {
            document.getElementById('default-header').classList.toggle('hidden');
            document.getElementById('search-header').classList.toggle('hidden');
            document.getElementById('search-header').classList.toggle('flex');
            if(!document.getElementById('search-header').classList.contains('hidden')) {
                document.getElementById('search-input').focus();
            }
        }

        function filterBatches() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = batchesData.filter(b => b.title.toLowerCase().includes(query));
            renderBatches(filtered);
            document.getElementById('clear-search-btn').classList.toggle('hidden', query === "");
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            filterBatches();
        }

        // Initialize App
        renderBatches(batchesData);
    </script>
</body>
</html>
